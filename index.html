<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerScope AI - Coming Soon</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(109, 40, 217, 0.05) 0%, transparent 70%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-20px, -20px) scale(1.1); }
            66% { transform: translate(20px, -10px) scale(0.9); }
        }

        /* Header */
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 15, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8b5cf6;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logo:hover {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.8);
            transform: translateY(-2px);
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #8b5cf6;
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: #ffffff;
        }

        nav a:hover::after {
            width: 100%;
        }

        .cta-button {
            background: #8b5cf6;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .cta-button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .content-wrapper {
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .tagline {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        /* Email form */
        .email-form {
            display: flex;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .email-input {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .email-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .submit-button {
            padding: 1rem 2rem;
            background: #8b5cf6;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
        }

        .submit-button:active::before {
            width: 300px;
            height: 300px;
        }

        /* Features */
        .features {
            display: flex;
            gap: 2rem;
            margin-top: 4rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .checkmark {
            color: #8b5cf6;
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 1.5rem 2rem;
            }

            nav {
                gap: 1rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            .cta-button {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }

            h1 {
                font-size: clamp(2.5rem, 10vw, 4rem);
            }

            .tagline {
                font-size: 1.1rem;
            }

            .email-form {
                flex-direction: column;
            }

            .email-input {
                min-width: 100%;
            }

            .features {
                flex-direction: column;
                align-items: center;
            }
        }

        /* Loading animation */
        .loading-dots {
            display: inline-flex;
            gap: 0.3rem;
            margin-left: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #8b5cf6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>

<body>
    <header>
        <a href="#" class="logo">HackerScope AI</a>
                <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.9rem;">
                Coming soon
                <span class="loading-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </span>
            </p>
    </header>

    <main>
        <div class="content-wrapper">
            <h1>Build the Next <br><span class="gradient-text">Big Thing</span></h1>
            
            <p class="tagline">
                AI-powered startup ideas. <br> Build something people want with researched and validated concepts.
            </p>

            <form class="email-form" action="https://formspree.io/f/xnnvawyg" method="POST">
                <input 
                    type="email" 
                    name="email"
                    class="email-input" 
                    placeholder="Enter your email" 
                    required
                >
                <button type="submit" class="submit-button">
                    Notify Me
                </button>
            </form>

            <div class="features">
                <div class="feature">
                    <span class="checkmark">✓</span>
                    <span>Built by indie hackers</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 HackerScope AI. All rights reserved.</p>
    </footer>

    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            
            const form = event.target;
            const emailInput = form.querySelector('.email-input');
            const button = form.querySelector('.submit-button');
            const originalText = button.textContent;
            
            // Show loading state
            button.textContent = 'Sending...';
            button.disabled = true;
            
            try {
                // Send to Formspree
                const response = await fetch('https://formspree.io/f/xnnvawyg', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailInput.value
                    })
                });
                
                if (response.ok) {
                    // Success
                    button.textContent = '✓ Thank you!';
                    button.style.background = '#10b981';
                    form.reset();
                } else {
                    throw new Error('Failed to submit');
                }
            } catch (error) {
                // Error handling
                console.error('Submission error:', error);
                button.textContent = '✗ Error! Try again';
                button.style.background = '#ef4444';
            } finally {
                // Reset button after delay
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = '#8b5cf6';
                    button.disabled = false;
                }, 3000);
            }
        }

        // Add parallax effect to background
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.body.style.backgroundPosition = `${x * 50}px ${y * 50}px`;
        });
    </script>
</body>
</html>
